services:
  ai-feed-bot:
    image: ${AI_FEED_BOT_IMAGE:-ghcr.io/<owner>/ai-feed-bot:latest}
    container_name: ai-feed-bot
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      AI_FEED_ENABLE_SLACK: "false"
      AI_FEED_ENABLE_WORKER: "true"
      AI_FEED_ENABLE_WEB: "true"
      AI_FEED_WEB_HOST: 0.0.0.0
      AI_FEED_WEB_PORT: "8000"
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./backup:/backup
    networks:
      - homeserver
      - slack-apps
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  homeserver:
    external: true
  slack-apps:
    external: true
