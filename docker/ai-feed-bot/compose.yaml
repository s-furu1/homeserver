services:
  ai-feed-bot:
    image: ${AI_FEED_BOT_IMAGE:-ghcr.io/<owner>/ai-feed-bot:latest}
    container_name: ai-feed-bot
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./backup:/backup
    networks:
      - homeserver
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  homeserver:
    external: true
