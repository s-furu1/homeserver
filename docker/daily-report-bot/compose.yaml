services:
  daily-report-bot:
    image: ${DAILY_REPORT_BOT_IMAGE:-ghcr.io/<owner>/daily-report-bot:latest}
    container_name: daily-report-bot
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DAILY_REPORT_ENABLE_SLACK: "false"
      DAILY_REPORT_ENABLE_WORKER: "true"
      DAILY_REPORT_ENABLE_WEB: "true"
      DAILY_REPORT_WEB_HOST: 0.0.0.0
      DAILY_REPORT_WEB_PORT: "8000"
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./backup:/backup
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - slack-apps

networks:
  slack-apps:
    external: true
