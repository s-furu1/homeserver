services:
  life-bot:
    image: ${LIFE_BOT_IMAGE:-ghcr.io/<owner>/life-bot:latest}
    container_name: life-bot
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "127.0.0.1:18080:8000"
    environment:
      AI_FEED_BASE_URL: http://ai-feed-bot:8000
      DAILY_REPORT_BASE_URL: http://daily-report-bot:8000
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./backup:/backup
      - ./secrets:/secrets:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - slack-apps

networks:
  slack-apps:
    external: true
