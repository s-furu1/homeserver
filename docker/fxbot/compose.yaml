services:
  fxbot:
    image: ghcr.io/s-furu1/fxbot:v0.1.0
    container_name: fxbot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/${FXBOT_MODE}:/data
    networks:
      - homeserver
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/fxbot_heartbeat && test $(($(date +%s) - $(stat -c %Y /tmp/fxbot_heartbeat))) -lt 180"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  homeserver:
    external: true
